# ApoB и Lp(a) НЕ СДАВАЛИСЬ — критический приоритет

last_updated: 2025-07-01
needs_update: false  # Свежие данные. Следующий чек: ApoB, Lp(a), HbA1c, половые гормоны

# ─────────────────────────────────────────────
# МЕТАБОЛИЗМ
# ─────────────────────────────────────────────
metabolic:
  glucose_fasting:
    dec2024: 5.47   # Medsi, СПб
    jul2025: 5.25   # Serbia
    unit: ммоль/л
    reference_lab: 4.11-5.89
    attia_optimal: <5.0
    status: borderline  # выше оптимума Attia; CGM показывает реактивный паттерн

  HbA1c:
    value: 5.3
    date: 2020-03-21
    unit: "%"
    reference_lab: <5.7
    attia_optimal: <5.1
    status: borderline  # данные 5-летней давности — ПЕРЕСДАТЬ (высокий приоритет)

  insulin_fasting:
    value: 5.22     # Jul 2025
    unit: мкМЕ/мл
    reference_lab: 2.6-24.9
    attia_optimal: <5.0
    status: borderline  # на границе оптимума

  HOMA_IR:
    notes: "2020: 1.17 (ok). Пересчитать после актуального HbA1c"

  cgm_data:
    source: CGM (непрерывный мониторинг)
    period: 2026-02-09 — 2026-02-21
    baseline_typical: "4.5–5.5 ммоль/л"
    postmeal_spikes_typical: "7.0–8.5 ммоль/л"
    postmeal_spikes_max: "8.7 ммоль/л (18 фев)"
    pattern: "реактивный — резкий подъём → быстрое падение → иногда гипо"
    hypoglycemia_alerts:
      - date: 2026-02-12
        episodes: 2   # ~04:00 и ~18:00, падение ниже 3.9 ммоль/л
        severity: significant
      - date: 2026-02-13
        episodes: 1   # ~12:30
        severity: moderate
      - date: 2026-02-14
        episodes: 1   # ~17:00
        severity: moderate
    status: ATTENTION
    notes: >
      Реактивный паттерн: быстрые углеводы → пик → компенсаторный выброс инсулина → падение.
      Гипо-эпизоды объясняют низкую энергию и тягу к сладкому.

# ─────────────────────────────────────────────
# СЕРДЕЧНО-СОСУДИСТЫЕ МАРКЕРЫ
# ─────────────────────────────────────────────
cardiovascular:
  ApoB: null    # НЕ СДАВАЛА — КРИТИЧЕСКИЙ ПРИОРИТЕТ #1 (LDL растёт, нужен ApoB)
  Lp_a: null    # НЕ СДАВАЛА — генетический маркер, сдаётся один раз в жизни

  total_cholesterol:
    dec2024: 4.6    # ммоль/л (Medsi)
    jul2025: 5.72   # ммоль/л (Serbia) — ВЫРОС на +1.12 за 7 месяцев!
    unit: ммоль/л
    attia_optimal_mmol: <4.15   # ~160 мг/дл
    trend: РАСТЁТ

  LDL:
    dec2024: 3.3    # ммоль/л — лаб флаг ↑
    jul2025: 4.0    # ммоль/л — вырос ещё на +0.7
    unit: ммоль/л
    attia_optimal_mmol: <1.8   # ~70 мг/дл для longevity
    status: ELEVATED
    notes: >
      LDL вырос с 3.3 → 4.0 ммоль/л за 7 месяцев (+21%).
      По Attia цель для longevity: <1.8 ммоль/л (~70 мг/дл).
      Без ApoB нельзя полностью оценить CVD-риск, но тренд настораживает.
      ApoB — сдать как можно скорее.

  HDL:
    dec2024: 1.45   # ммоль/л
    jul2025: 1.47   # ммоль/л
    unit: ммоль/л
    attia_optimal_mmol: ">1.55"  # для женщин
    status: borderline   # стабильный, чуть ниже оптимума

  triglycerides:
    dec2024: 0.35   # ммоль/л
    jul2025: 0.43   # ммоль/л
    unit: ммоль/л
    attia_optimal_mmol: <0.85
    status: EXCELLENT    # очень низкие TG — позитивный маркер

  TG_HDL_ratio:
    dec2024: 0.24   # отлично (<0.5 — оптимум по Attia)
    jul2025: 0.29
    status: EXCELLENT
    notes: "Низкий TG/HDL указывает на отсутствие инсулинорезистентности"

  atherogenicity_index:
    dec2024: 2.2    # ref 1.0-2.2 — на верхней границе
    status: borderline

