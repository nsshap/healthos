# Программа тренировок
# Обновлено: 2026-02-21
# Принцип: дополняет пилатес, не заменяет. Металлическое бедро — zero impact.

schedule:
  pilates:
    frequency: 3x_week
    type: strength
    notes: "Основа программы — текущие занятия сохранить"

  zone2_cardio:
    frequency: 3x_week
    duration_min: 30
    options:
      - велосипед (зал или улица, без подъёмов)
      - плавание
      - быстрая ходьба (5+ км/ч, ровная поверхность)
      - эллипсоид (если доступен)
    target_hr: "можешь говорить предложениями, но не петь"
    notes: "Можно совмещать с прогулкой после пилатеса"

  rest:
    frequency: 1x_week
    notes: "Полный отдых или лёгкая растяжка"

banned:
  - бег
  - прыжки любого вида
  - box jumps
  - burpees
  - высокоударная аэробика
  - тяжёлые приседания со штангой (уточнить у ортопеда)

progression:
  zone2: "Начать с 20 мин, добавлять по 5 мин каждые 2 недели до 45 мин"
  pilates: "Следовать прогрессии тренера"

recovery_zones:
  good_slept: "Полный объём"
  tired: "50% объёма Zone 2, пилатес без изменений"
  poor_sleep_lt6h: "Пропустить Zone 2, пилатес по самочувствию"

weekly_template:
  monday: пилатес
  tuesday: zone2 (30 мин)
  wednesday: пилатес
  thursday: zone2 (30 мин)
  friday: пилатес
  saturday: zone2 (30 мин) или отдых
  sunday: отдых
